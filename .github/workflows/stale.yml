name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v8
        with:
          stale-issue-message: >
            This has been automatically marked as stale due to the lack of activity. It will be closed if no further activity occurs.

            If you believe this issue is still valid, please provide an update to reassure that it is needed and all open questions were answered.
            When verifying, please use the master branch as this may have already been resolved.

          stale-pr-message: >
            This has been automatically marked as stale due to the lack of activity. It will be closed if no further activity occurs.

            If you believe this PR is still valid, please provide an update to reassure that it is needed and all open questions were answered.
            When verifying, please use the master branch as this may have already been resolved.

            Thank you for your contributions.

          days-before-stale: 60
          days-before-close: 14

          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned,security'

          stale-issue-label: 'wontfix'
          stale-pr-label: 'wontfix'
